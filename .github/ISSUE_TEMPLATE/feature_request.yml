name: Feature request
description: Propose an enhancement for AgentPay SDK
title: "[Feature] "
labels:
  - enhancement
body:
  - type: input
    id: problem
    attributes:
      label: Problem statement
      description: What user or developer problem are you trying to solve?
      placeholder: Today it is hard to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred design and expected behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives did you evaluate?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Risk and compatibility impact
      description: Include breaking-change risk, migration needs, and security considerations.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I explained why this should be part of this project scope.
          required: true
