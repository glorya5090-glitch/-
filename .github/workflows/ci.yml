name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  js-unit:
    name: JS unit tests
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile
        env:
          AGENTPAY_SKIP_RUST_INSTALL: '1'

      - name: Run JS unit tests
        run: pnpm turbo run test:unit

  js-e2e:
    name: JS e2e and integration tests
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile
        env:
          AGENTPAY_SKIP_RUST_INSTALL: '1'

      - name: Run JS e2e tests
        run: pnpm test:ts

  rust:
    name: Rust tests
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-tests

      - name: Run Rust tests
        run: node ./scripts/run-tests-isolated.mjs -- cargo test --workspace --locked
