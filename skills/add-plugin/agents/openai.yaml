interface:
  display_name: "Add AgentPay Plugin"
  short_description: "Add a new agentpay plugin with shared CLI plumbing"
  default_prompt: "Use $add-plugin to add or refactor a `agentpay <plugin>` integration by registering it under `src/plugins`, keeping plugin-specific API code in `src/lib/<plugin>`, reusing the shared Rust daemon signing path through `CliPluginContext`, and adding focused CLI tests."

policy:
  allow_implicit_invocation: true
