service: agentpay-relay
frameworkVersion: '4'
plugins:
  - serverless-esbuild

provider:
  name: aws
  runtime: nodejs20.x
  architecture: arm64
  stage: ${opt:stage, 'local'}
  region: ${env:AWS_REGION, 'us-east-1'}
  logRetentionInDays: 14
  memorySize: 512
  timeout: 29
  environment:
    CACHE_URL: ${env:CACHE_URL, 'redis://127.0.0.1:6379'}
    HOST: 0.0.0.0
    LOG_LEVEL: ${env:LOG_LEVEL, 'debug'}
    NODE_ENV: ${env:NODE_ENV, 'development'}
    PORT: 8787
    RELAY_ADMIN_TOKEN: ${env:RELAY_ADMIN_TOKEN}
    RELAY_ALLOWED_ORIGINS: ${env:RELAY_ALLOWED_ORIGINS, 'http://127.0.0.1:3000,http://localhost:3000'}
    RELAY_BASE_URL: ${env:RELAY_BASE_URL, 'http://127.0.0.1:8787'}
    RELAY_CACHE_NAMESPACE: ${env:RELAY_CACHE_NAMESPACE, 'agentpay:relay'}
    RELAY_DAEMON_TOKEN: ${env:RELAY_DAEMON_TOKEN}
    RELAY_ENABLE_PRETTY_LOGS: 'true'
    RELAY_FRONTEND_BASE_URL: ${env:RELAY_FRONTEND_BASE_URL, 'http://127.0.0.1:3000'}
    RELAY_POLL_MAX_UPDATES: ${env:RELAY_POLL_MAX_UPDATES, '25'}
    RELAY_UPDATE_LEASE_SECONDS: ${env:RELAY_UPDATE_LEASE_SECONDS, '30'}

functions:
  api:
    name: ${self:provider.stage}-${self:service}
    handler: src/handler.handler
    description: AgentPay relay API
    events:
      - httpApi:
          path: /
          method: ANY
      - httpApi:
          path: /{proxy+}
          method: ANY

package:
  individually: true

custom:
  esbuild:
    bundle: true
    external: []
    format: esm
    minify: false
    outExtension:
      .js: .mjs
    packagePath: ../../../apps/relay/package.json
    platform: node
    sourcemap: true
    target: node20
