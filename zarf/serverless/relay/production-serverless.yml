service: agentpay-relay
frameworkVersion: '4'
plugins:
  - serverless-esbuild

provider:
  name: aws
  runtime: nodejs20.x
  architecture: arm64
  stage: ${opt:stage, 'production'}
  region: ${env:AWS_REGION, 'us-east-1'}
  logRetentionInDays: 90
  memorySize: 1024
  timeout: 29
  environment:
    CACHE_URL: ${ssm:/${self:provider.stage}/relay/CACHE_URL, env:CACHE_URL}
    HOST: 0.0.0.0
    LOG_LEVEL: ${env:LOG_LEVEL, 'info'}
    NODE_ENV: production
    PORT: 8787
    RELAY_ADMIN_TOKEN: ${ssm:/${self:provider.stage}/relay/ADMIN_TOKEN, env:RELAY_ADMIN_TOKEN}
    RELAY_ALLOWED_ORIGINS: ${env:RELAY_ALLOWED_ORIGINS}
    RELAY_BASE_URL: ${ssm:/${self:provider.stage}/relay/BASE_URL, env:RELAY_BASE_URL}
    RELAY_CACHE_NAMESPACE: ${ssm:/${self:provider.stage}/relay/CACHE_NAMESPACE, env:RELAY_CACHE_NAMESPACE, 'agentpay:relay'}
    RELAY_DAEMON_TOKEN: ${ssm:/${self:provider.stage}/relay/DAEMON_TOKEN, env:RELAY_DAEMON_TOKEN}
    RELAY_ENABLE_PRETTY_LOGS: 'false'
    RELAY_FRONTEND_BASE_URL: ${ssm:/${self:provider.stage}/relay/FRONTEND_BASE_URL, env:RELAY_FRONTEND_BASE_URL}
    RELAY_POLL_MAX_UPDATES: ${ssm:/${self:provider.stage}/relay/POLL_MAX_UPDATES, env:RELAY_POLL_MAX_UPDATES, '25'}
    RELAY_UPDATE_LEASE_SECONDS: ${ssm:/${self:provider.stage}/relay/UPDATE_LEASE_SECONDS, env:RELAY_UPDATE_LEASE_SECONDS, '30'}

functions:
  api:
    name: ${self:provider.stage}-${self:service}
    handler: src/handler.handler
    description: AgentPay relay API
    events:
      - httpApi:
          path: /
          method: ANY
      - httpApi:
          path: /{proxy+}
          method: ANY

package:
  individually: true

custom:
  esbuild:
    bundle: true
    external: []
    format: esm
    minify: true
    outExtension:
      .js: .mjs
    packagePath: ../../../apps/relay/package.json
    platform: node
    sourcemap: true
    target: node20
